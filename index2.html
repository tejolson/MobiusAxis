<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudermannian Function Explorer</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Gudermannian Function Explorer</h1>
    <p>Explore the geometric relationship between circles and hyperbolae through the Gudermannian function.</p>
    <canvas id="canvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function drawGudermannian() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'lightblue';
            for (let x = -5; x <= 5; x += 0.1) {
                const y = Math.atan(Math.sinh(x));
                ctx.fillRect(400 + x * 70, 200 - y * 70, 2, 2);
            }
        }

        function drawCirclesAndHyperbolae() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);  
            ctx.lineTo(centerX + 150, centerY);
            ctx.arc(centerX, centerY, 150, Math.PI, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
        }

        function render() {
            drawGudermannian();
            drawCirclesAndHyperbolae();
        }

        render();
    </script>
</body>
</html>
