<!DOCTYPE html>
<-- data:text/html, 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Laboratory</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: black;
    }
    #canvas1 {
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <canvas id="canvas1"></canvas>
  <script>
    const canvas = document.getElementById("canvas1");
    const ctx= canvas.getContext("2d");

    const SIZE = 600;
    canvas.height = SIZE;
    canvas.width = SIZE;
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.lineTo(200,500);
    ctx.stroke();
  </script>
</body>
</html>
